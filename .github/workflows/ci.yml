name: CI

# Pipeline consolidado: 1 job "quality" serial em vez de 4 jobs paralelos
# (lint, test, security, docker-build). Motivo: pip install repetia 4x mesmo
# com cache hit (~30s cada), gastando ~3min de Action minutes por PR em
# overhead. A consolidacao mantem todos os gates (ruff, black, mypy, bandit,
# pip-audit, pytest, gitleaks, docker build) executados em ordem, perdendo
# paralelismo mas economizando billing.
#
# Os 3 workflows deploy-*.yml (AWS ECS / Cloud Run / Vercel) permanecem
# separados com `if: false` como TEMPLATES MULTI-CLOUD do starter — o
# usuario que clonar habilita o que precisar.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  POSTGRES_USER: ci
  POSTGRES_PASSWORD: ci
  POSTGRES_DB: webapi_start_test

jobs:
  quality:
    # Consolida lint + format + typecheck + security + test num unico runner.
    # Pip install roda 1x e todos os passos compartilham o venv. Falha cedo
    # se ruff/black/test quebrarem — mypy e bandit ficam com continue-on-error
    # porque sao informativos (gradual typing / SAST com falsos positivos).
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: webapi_start_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Format (black)
        run: black --check app tests

      - name: Typecheck (mypy, informativo)
        # Gate informativo ate limpeza progressiva da base. Remover
        # continue-on-error quando mypy estiver verde (issue dedicada).
        continue-on-error: true
        run: mypy app

      - name: Security (bandit, informacional)
        continue-on-error: true
        run: bandit -r app -ll -q

      - name: Security (pip-audit, bloqueante)
        # Starter mantem --strict (sem --ignore-vuln) intencionalmente:
        # como template publico, qualquer CVE em deps precisa ser corrigida
        # antes do release, nao tolerada. Diverge do WebApiAlcance (que tem
        # lista de ignores justificados).
        run: pip-audit --requirement requirements.txt --strict

      - name: Generate ephemeral SECRET_KEY for CI
        run: echo "SECRET_KEY=$(openssl rand -hex 48)" >> "$GITHUB_ENV"

      - name: Apply migrations
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        run: alembic upgrade head

      - name: Tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Gitleaks (secrets scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compileall
        run: python -m compileall app

      - name: Pip check
        run: python -m pip check

  docker-build:
    # Mantido separado porque depende de docker buildx (action diferente)
    # e cache de layers proprio. Roda apos quality passar.
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: webapi-start:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
